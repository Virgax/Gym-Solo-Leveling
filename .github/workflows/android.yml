name: Android APK

on:
  push:
    branches: [ "claude/gym-solo-leveling-hzojie", "main" ]
    paths: [ "android/**", ".github/workflows/android.yml" ]
  pull_request:
    paths: [ "android/**", ".github/workflows/android.yml" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: arise-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # One-tap download: publishes the APK to a rolling GitHub Release so it can
      # be installed straight from the phone (no login, no zip). Only on main.
      - name: Publish APK to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Arise — Android (latest)
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
