name: Web PWA

on:
  push:
    branches: [ "main", "claude/gym-solo-leveling-hzojie" ]
    paths: [ "web/**", ".github/workflows/web.yml" ]
  pull_request:
    paths: [ "web/**", ".github/workflows/web.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
        env:
          VITE_BASE: /Gym-Solo-Leveling/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  # Publishes the live link. Runs only on the default branch (main); enable
  # Pages once under Settings → Pages → Source: GitHub Actions.
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
